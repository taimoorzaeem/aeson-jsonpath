name: Build and Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  cabal:
    strategy:
      matrix:
        ghc: ['9.4.8','9.14.1']
        os:
          - runner: windows-latest
            name: Windows
          - runner: macos-latest
            name: MacOS
          - runner: ubuntu-latest
            name: Linux
      fail-fast: false
    name: Cabal - ${{ matrix.os.name }} GHC ${{ matrix.ghc }}
    runs-on: ${{ matrix.os.runner }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
      with:
        ghc-version: ${{ matrix.ghc }}
        submodules: true
 
    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cabal
          ~/.cache/cabal
          dist-newstyle
        key: ${{ matrix.os.runner }}-cabal-${{ matrix.ghc }}-${{ hashFiles('aeson-jsonpath.cabal') }}
        restore-keys: |
          ${{ matrix.os.runner }}-cabal-${{ matrix.ghc }}
          ${{ matrix.os.runner }}-cabal-

    - name: Update Submodule
      run: |
        git submodule update --init --recursive
        git submodule update --remote

    - name: Update Cabal package list
      run: cabal v2-update --with-compiler=ghc-${{ matrix.ghc }}
 
    - name: Build project
      run: cabal v2-build --with-compiler=ghc-${{ matrix.ghc }}

    - name: Run tests
      run: cabal v2-test spec --with-compiler=ghc-${{ matrix.ghc }}

  stack:
    strategy:
      matrix:
        resolver: ['lts', 'nightly']
        os:
          - runner: windows-latest
            name: Windows
          - runner: macos-latest
            name: MacOS
          - runner: ubuntu-latest
            name: Linux
      fail-fast: false
    name: Stack - ${{ matrix.os.name }} Resolver ${{ matrix.resolver }}
    runs-on: ${{ matrix.os.runner }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
      with:
        enable-stack: true
        submodules: true

    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.stack
          .stack-work
        key: ${{ matrix.os.runner }}-stack-${{ matrix.resolver }}-${{ hashFiles('stack.yaml') }}
        restore-keys: |
          ${{ matrix.os.runner }}-stack-${{ matrix.resolver }}-
          ${{ matrix.os.runner }}-stack-

    - name: Update Submodule
      run: |
        git submodule update --init --recursive
        git submodule update --remote

    - name: Install dependencies for resolver ${{ matrix.resolver }}
      run: stack setup --resolver ${{ matrix.resolver }}

    - name: Build the project with resolver ${{ matrix.resolver }}
      run: stack build --resolver ${{ matrix.resolver }}

    - name: Run spec tests with resolver ${{ matrix.resolver }}
      run: stack test :spec --resolver ${{ matrix.resolver }}
